name: Release-plz

permissions:
  contents: read

on:
  push:
    branches:
      - main

jobs:
  # Release unpublished packages to crates.io (and create the git tag +
  # GitHub release) once a release PR has been merged.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'strawlab' }}
    permissions:
      contents: write
      # OIDC token used for crates.io trusted publishing (no API token needed).
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Open / update the "release" PR that bumps the version and updates the
  # changelog whenever new commits land on main.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'strawlab' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          # Falls back to the default GITHUB_TOKEN. Set RELEASE_PLZ_TOKEN
          # (a PAT or GitHub App token) so CI actually runs on the release PR.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
