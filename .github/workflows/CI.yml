name: CI

permissions:
  contents: read

on:
  push:
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
    - name: rustfmt
      run: cargo fmt --check
    - name: clippy
      run: cargo clippy --all-targets -- -D warnings
    - name: Run tests
      run: cargo test
    - name: Check docs
      run: cargo doc --no-deps
      env:
        RUSTDOCFLAGS: -D warnings

  msrv:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    # Must match `rust-version` in Cargo.toml. Cargo.lock is not committed, so
    # the MSRV-aware resolver (edition 2024) picks dependency versions
    # compatible with this toolchain on a fresh resolve.
    - uses: dtolnay/rust-toolchain@1.85.0
    - name: Check on MSRV
      run: cargo check --all-features
